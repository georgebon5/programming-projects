# PodDisruptionBudgets ensure minimum pod availability during voluntary disruptions
# (node drains, cluster upgrades, etc.)
# Requires policy/v1 (Kubernetes 1.21+)

# PodDisruptionBudget for API — always keep at least 1 pod running
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rag-api-pdb
  namespace: rag-system
  labels:
    app: rag-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rag-api
---
# PodDisruptionBudget for Celery Worker — always keep at least 1 worker running
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: celery-worker-pdb
  namespace: rag-system
  labels:
    app: celery-worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: celery-worker
