apiVersion: batch/v1
kind: Job
metadata:
  name: rag-db-migrate
  namespace: rag-system
  labels:
    app: rag-api
    component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600  # Auto-cleanup 10 minutes after completion
  template:
    metadata:
      labels:
        app: rag-api
        component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/YOUR_ORG/multi-tenant-rag:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: rag-secrets
            - configMapRef:
                name: rag-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
