# SealedSecret — encrypted version of rag-secrets.
# Generated with: kubeseal --format yaml < secret.yml > sealed-secret.yml
# The sealed-secrets controller in the cluster decrypts this into a regular Secret.
#
# IMPORTANT: Only the sealed-secrets controller can decrypt these values.
# They are safe to commit to version control.
#
# To regenerate with real values:
#   1. Copy k8s/secret.yml outside the repo and fill in real values
#   2. kubeseal --format yaml --cert pub-cert.pem < /tmp/secret.yml > k8s/sealed-secret.yml
#   3. kubectl apply -f k8s/sealed-secret.yml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rag-secrets
  namespace: rag-system
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    DATABASE_URL: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    JWT_SECRET_KEY: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    OPENAI_API_KEY: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    S3_ACCESS_KEY_ID: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    S3_SECRET_ACCESS_KEY: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    S3_BUCKET_NAME: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    STRIPE_SECRET_KEY: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    STRIPE_WEBHOOK_SECRET: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    POSTGRES_USER: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
    POSTGRES_PASSWORD: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  # placeholder
  template:
    metadata:
      name: rag-secrets
      namespace: rag-system
    type: Opaque
