apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: rag-system
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/YOUR_ORG/multi-tenant-rag:latest
          command: ["celery", "-A", "app.worker", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rag-data-pvc
