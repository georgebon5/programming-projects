# ============================================================================
# SECRET TEMPLATE — DO NOT PUT REAL VALUES HERE
# ============================================================================
# This file is a TEMPLATE showing the required secret keys.
# In production, use Sealed Secrets (see README-sealed-secrets.md):
#
#   1. Copy this file somewhere outside the repo
#   2. Fill in real values
#   3. Seal it: kubeseal --format yaml --cert pub-cert.pem < secret.yml > sealed-secret.yml
#   4. Apply:   kubectl apply -f k8s/sealed-secret.yml
#   5. Delete the plaintext copy
#
# For local development / staging, you can apply this directly:
#   kubectl apply -f k8s/secret.yml
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag-system
type: Opaque
stringData:
  # PostgreSQL credentials — referenced by both the app and the PostgreSQL StatefulSet
  POSTGRES_USER: "rag_user"
  POSTGRES_PASSWORD: "CHANGE-ME-use-strong-password"
  DATABASE_URL: "postgresql://rag_user:CHANGE-ME-use-strong-password@postgres-svc:5432/multi_tenant_rag"
  JWT_SECRET_KEY: "CHANGE-ME-in-production-use-a-long-random-string"
  OPENAI_API_KEY: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
  S3_BUCKET_NAME: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
