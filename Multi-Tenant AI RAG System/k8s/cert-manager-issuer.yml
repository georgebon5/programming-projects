# cert-manager ClusterIssuers for Let's Encrypt
#
# Prerequisites:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=120s
#
# Usage:
#   - Start with letsencrypt-staging to verify ACME works (no rate-limit risk)
#   - Switch ingress annotation to letsencrypt-prod once staging cert is issued
#   - Update ingress.yml annotation: cert-manager.io/cluster-issuer: "letsencrypt-prod"

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Replace with your real email — Let's Encrypt sends expiry notices here
    email: admin@your-domain.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Replace with your real email — Let's Encrypt sends expiry notices here
    email: admin@your-domain.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
