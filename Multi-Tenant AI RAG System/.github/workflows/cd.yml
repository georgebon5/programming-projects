name: CD — Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      full_image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.workflow_run.head_sha }} | head -c7)" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    env:
      KUBECONFIG_DATA: ${{ secrets.STAGING_KUBECONFIG }}
      FULL_IMAGE: ${{ needs.build-and-push.outputs.full_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run database migrations
        run: |
          JOB_NAME="rag-db-migrate-$(date +%s)"
          kubectl create job "$JOB_NAME" \
            --from=job/rag-db-migrate \
            -n rag-system \
            --dry-run=client -o yaml \
          | sed "s|ghcr.io/YOUR_ORG/multi-tenant-rag:latest|$FULL_IMAGE|g" \
          | kubectl apply -f -
          kubectl wait job/"$JOB_NAME" \
            -n rag-system \
            --for=condition=complete \
            --timeout=120s

      - name: Update API deployment image
        run: |
          kubectl set image deployment/rag-api \
            api=$FULL_IMAGE \
            -n rag-system

      - name: Update worker deployment image
        run: |
          kubectl set image deployment/rag-worker \
            worker=$FULL_IMAGE \
            -n rag-system

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/rag-api \
            -n rag-system \
            --timeout=300s

      - name: Wait for worker rollout
        run: |
          kubectl rollout status deployment/rag-worker \
            -n rag-system \
            --timeout=300s

      - name: Smoke test
        run: |
          # Wait for ingress to propagate, then hit /health
          STAGING_HOST="${{ vars.STAGING_HOST }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$STAGING_HOST/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 2 minutes"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    env:
      KUBECONFIG_DATA: ${{ secrets.PROD_KUBECONFIG }}
      FULL_IMAGE: ${{ needs.build-and-push.outputs.full_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run database migrations
        run: |
          JOB_NAME="rag-db-migrate-$(date +%s)"
          kubectl create job "$JOB_NAME" \
            --from=job/rag-db-migrate \
            -n rag-system \
            --dry-run=client -o yaml \
          | sed "s|ghcr.io/YOUR_ORG/multi-tenant-rag:latest|$FULL_IMAGE|g" \
          | kubectl apply -f -
          kubectl wait job/"$JOB_NAME" \
            -n rag-system \
            --for=condition=complete \
            --timeout=120s

      - name: Update API deployment image
        run: |
          kubectl set image deployment/rag-api \
            api=$FULL_IMAGE \
            -n rag-system

      - name: Update worker deployment image
        run: |
          kubectl set image deployment/rag-worker \
            worker=$FULL_IMAGE \
            -n rag-system

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/rag-api \
            -n rag-system \
            --timeout=300s

      - name: Wait for worker rollout
        run: |
          kubectl rollout status deployment/rag-worker \
            -n rag-system \
            --timeout=300s

      - name: Smoke test
        run: |
          PROD_HOST="${{ vars.PROD_HOST }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$PROD_HOST/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 2 minutes"
          exit 1
